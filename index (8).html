<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP-700 Study Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #2d3142; --bg-alt: #4f5d75; --silver: #bfc0c0; --white: #ffffff; --orange: #ef8354; --danger: #ff5f5f; --amber: #ffbf00; --font-din: "Inter", sans-serif;
        }
        body {
            background: var(--bg-dark); color: var(--white); font-family: var(--font-din);
            margin: 0; display: flex; height: 100vh; font-weight: 300; overflow: hidden;
        }
        .sidebar {
            width: 280px; background: rgba(45, 49, 66, 0.95); border-right: 1px solid var(--bg-alt);
            padding: 30px; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.3); z-index: 10;
        }
        .logo { font-size: 20px; font-weight: 600; letter-spacing: 3px; margin-bottom: 40px; color: var(--orange); text-transform: uppercase; }
        
        /* INTEGRATED GLASS TIMER */
        .main-timer-wrapper {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px 25px; border-radius: 4px; margin-bottom: 15px;
        }
        .matrix-frame {
            line-height: 0; 
            background: rgba(0,0,0,0.2); /* Very light blend */
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 2px;
        }
        .timer-controls { display: flex; flex-direction: column; gap: 8px; }
        .timer-btn { 
            background: var(--bg-alt); border: 1px solid rgba(255,255,255,0.1); color: white; 
            padding: 8px 15px; border-radius: 4px; font-size: 10px; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; min-width: 95px; 
        }
        .timer-btn:hover { background: var(--orange); }
        .timer-btn.active { color: var(--danger); border-color: var(--danger); }

        /* UI COMPONENTS */
        .label-sm { font-size: 11px; color: var(--silver); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .topic-stat { color: var(--orange); font-weight: 600; }
        .reset-link { font-size: 10px; color: var(--silver); cursor: pointer; text-decoration: underline; opacity: 0.6; transition: 0.3s; }
        
        .select-box, .search-bar { background: var(--bg-alt); color: var(--white); border: 1px solid transparent; padding: 12px; border-radius: 4px; outline: none; margin-bottom: 20px; font-family: var(--font-din); width: 100%; box-sizing: border-box; }
        .progress-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 4px; margin-top: 10px; }
        .progress-bar-bg { background: var(--bg-dark); height: 6px; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-fill { background: var(--orange); height: 100%; width: 0%; transition: 0.5s ease; }

        .btn-reset-all { background: transparent; border: 1px solid rgba(255, 95, 95, 0.3); color: var(--danger); padding: 10px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }

        .main { flex: 1; overflow-y: auto; padding: 60px; background: linear-gradient(135deg, var(--bg-dark) 0%, #1e212d 100%); }
        
        .header-banner { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 4px; 
            padding: 30px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;
        }
        
        .donut-container { position: relative; width: 80px; height: 80px; }
        .donut-svg { transform: rotate(-90deg); }
        .donut-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 4; }
        .donut-fill { fill: none; stroke: var(--orange); stroke-width: 4; stroke-dasharray: 220; stroke-dashoffset: 220; transition: stroke-dashoffset 0.6s ease; stroke-linecap: round; }
        .donut-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; font-weight: 600; color: var(--white); }

        .list-item { display: flex; align-items: center; background: rgba(191, 192, 192, 0.05); border: 1px solid rgba(191, 192, 192, 0.1); margin-bottom: 10px; padding: 15px 25px; border-radius: 4px; text-decoration: none; color: var(--silver); transition: 0.3s ease; }
        .list-item:hover { background: var(--bg-alt); border-color: var(--orange); transform: translateX(8px); }
        .check-btn { width: 22px; height: 22px; border: 2px solid var(--orange); border-radius: 4px; margin-right: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .check-btn.active { background: var(--orange); }
        .check-btn.active::after { content: '✓'; color: white; font-size: 14px; font-weight: bold; }
        .q-link { flex: 1; display: flex; align-items: center; text-decoration: none; color: inherit; }
        .q-id { font-weight: 600; color: var(--white); width: 120px; font-size: 15px; }
        .go-icon { color: var(--orange); font-size: 18px; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">FABRIC // DP-700</div>
        <div class="label-sm">Provider / Source</div>
        <select class="select-box" id="sourceDropdown"><option value="ExamTopics">ExamTopics (ET)</option></select>
        <div class="label-sm">
            <span>Domain / Topic <span class="topic-stat" id="topicPercent">0%</span></span>
            <span class="reset-link" onclick="resetTopic()">Reset Topic</span>
        </div>
        <select class="select-box" id="topicDropdown">
            <option value="Topic 1">Topic 1: Data Ingestion</option>
            <option value="Topic 2">Topic 2: Data Modeling</option>
            <option value="Topic 3">Topic 3: Monitor & Optimize</option>
        </select>
        <div class="label-sm">Search Questions</div>
        <input type="text" class="search-bar" id="searchInput" placeholder="Filter questions...">
        <div class="progress-box">
            <div class="label-sm">Overall Completion</div>
            <div id="progressText" style="font-size: 18px; color: var(--orange); font-weight: 600;">0%</div>
            <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <button class="btn-reset-all" onclick="resetAll()">Reset All Progress</button>
    </div>

    <div class="main">
        <div class="main-timer-wrapper">
            <div class="matrix-frame">
                <svg width="340" height="70" viewBox="0 0 340 70" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <mask id="textMask">
                            <text id="svgTime" x="50%" y="65%" font-family="'Share Tech Mono', monospace" font-size="48" fill="white" text-anchor="middle" letter-spacing="6">00:00:00</text>
                        </mask>
                        <pattern id="dotGrid" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse">
                            <circle cx="2.5" cy="2.5" r="1.8" fill="#ef8354" /> 
                        </pattern>
                        <filter id="amberGlow">
                            <feGaussianBlur stdDeviation="1.8" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    
                    <rect width="100%" height="100%" fill="none" />
                    <rect width="100%" height="100%" fill="url(#dotGrid)" opacity="0.08" />
                    
                    <rect width="100%" height="100%" fill="url(#dotGrid)" mask="url(#textMask)" filter="url(#amberGlow)" />
                </svg>
            </div>
            <div class="timer-controls">
                <button class="timer-btn" id="startPauseBtn" onclick="toggleTimer()">Engage</button>
                <button class="timer-btn" onclick="resetTimer()">Reset</button>
            </div>
        </div>

        <div class="header-banner">
            <div>
                <h2 id="viewHeader" style="margin: 0; font-weight: 400; letter-spacing: 2px; text-transform: uppercase;">TOPIC SELECTION</h2>
                <p id="viewSource" style="color: var(--silver); font-size: 12px; margin: 8px 0 0; text-transform: uppercase; letter-spacing: 1px;">SOURCE</p>
            </div>
            <div class="donut-container">
                <svg class="donut-svg" width="80" height="80">
                    <circle class="donut-bg" cx="40" cy="40" r="35"></circle>
                    <circle id="donutFill" class="donut-fill" cx="40" cy="40" r="35"></circle>
                </svg>
                <div class="donut-text" id="donutLabel">0%</div>
            </div>
        </div>
        <div class="list-container" id="questionList"></div>
    </div>

                ],
                "Topic 3": [
                    { q: 1, url: "https://www.examtopics.com/discussions/microsoft/view/154684-exam-dp-700-topic-3-question-1-discussion/" },
                    { q: 2, url: "https://www.examtopics.com/discussions/microsoft/view/153744-exam-dp-700-topic-3-question-2-discussion/" },
                    { q: 3, url: "https://www.examtopics.com/discussions/microsoft/view/155698-exam-dp-700-topic-3-question-3-discussion/" },
                    { q: 4, url: "https://www.examtopics.com/discussions/microsoft/view/154679-exam-dp-700-topic-3-question-4-discussion/" },
                    { q: 5, url: "https://www.examtopics.com/discussions/microsoft/view/153754-exam-dp-700-topic-3-question-5-discussion/" },
                    { q: 6, url: "https://www.examtopics.com/discussions/microsoft/view/153755-exam-dp-700-topic-3-question-6-discussion/" },
                    { q: 7, url: "https://www.examtopics.com/discussions/microsoft/view/153756-exam-dp-700-topic-3-question-7-discussion/" },
                    { q: 8, url: "https://www.examtopics.com/discussions/microsoft/view/153757-exam-dp-700-topic-3-question-8-discussion/" },
                    { q: 9, url: "https://www.examtopics.com/discussions/microsoft/view/153758-exam-dp-700-topic-3-question-9-discussion/" },
                    { q: 10, url: "https://www.examtopics.com/discussions/microsoft/view/155699-exam-dp-700-topic-3-question-10-discussion/" },

                    { q: 13, url: "https://www.examtopics.com/discussions/microsoft/view/302546-exam-dp-700-topic-3-question-13-discussion/" },
                    { q: 14, url: "https://www.examtopics.com/discussions/microsoft/view/302447-exam-dp-700-topic-3-question-14-discussion/" },
                    { q: 15, url: "https://www.examtopics.com/discussions/microsoft/view/304614-exam-dp-700-topic-3-question-15-discussion/" },
                    { q: 16, url: "https://www.examtopics.com/discussions/microsoft/view/304566-exam-dp-700-topic-3-question-16-discussion/" }
                ]
            }
        };

        const sourceDropdown = document.getElementById('sourceDropdown');
        const topicDropdown = document.getElementById('topicDropdown');
        const list = document.getElementById('questionList');
        const searchInput = document.getElementById('searchInput');
        const header = document.getElementById('viewHeader');
        const sourceLabel = document.getElementById('viewSource');
        const donutFill = document.getElementById('donutFill');
        const donutLabel = document.getElementById('donutLabel');
        
        let checkedItems = JSON.parse(localStorage.getItem('dp700_progress_v3')) || {};
        let savedNotes = JSON.parse(localStorage.getItem('dp700_notes_v3')) || {};

        function updateProgress() {
            let totalOverall = 0;
            let completedOverall = Object.keys(checkedItems).length;
            Object.keys(masterData).forEach(src => {
                Object.keys(masterData[src]).forEach(top => {
                    totalOverall += masterData[src][top].length;
                });
            });
            const overallPercent = totalOverall > 0 ? Math.round((completedOverall / totalOverall) * 100) : 0;
            document.getElementById('progressFill').style.width = overallPercent + '%';
            document.getElementById('progressText').innerText = overallPercent + '%';

            const currentSource = sourceDropdown.value;
            const currentTopic = topicDropdown.value;
            const topicQuestions = masterData[currentSource][currentTopic] || [];
            let completedTopic = 0;
            topicQuestions.forEach(item => {
                const qKey = `${currentSource}_${currentTopic}_Q${item.q}`;
                if (checkedItems[qKey]) completedTopic++;
            });
            
            const topicPercent = topicQuestions.length > 0 ? Math.round((completedTopic / topicQuestions.length) * 100) : 0;
            document.getElementById('topicPercent').innerText = topicPercent + '%';
            donutLabel.innerText = topicPercent + '%';
            const offset = 220 - (220 * topicPercent) / 100;
            donutFill.style.strokeDashoffset = offset;
        }

        window.toggleCheck = function(qKey, event) {
            event.stopPropagation();
            if (checkedItems[qKey]) { delete checkedItems[qKey]; } 
            else { checkedItems[qKey] = true; }
            saveAndSync();
        }

        window.saveNote = function(qKey, text) {
            savedNotes[qKey] = text;
            localStorage.setItem('dp700_notes_v3', JSON.stringify(savedNotes));
        }

        function saveAndSync() {
            localStorage.setItem('dp700_progress_v3', JSON.stringify(checkedItems));
            render();
            updateProgress();
        }

        function render() {
            const sourceValue = sourceDropdown.value;
            const topicValue = topicDropdown.value;
            const searchTerm = searchInput.value.toLowerCase();
            
            header.innerText = topicDropdown.options[topicDropdown.selectedIndex].text.toUpperCase();
            sourceLabel.innerText = sourceDropdown.options[sourceDropdown.selectedIndex].text.toUpperCase();

            const currentQuestions = masterData[sourceValue][topicValue] || [];
            list.innerHTML = currentQuestions
                .filter(item => `Question ${item.q}`.toLowerCase().includes(searchTerm) || (savedNotes[`${sourceValue}_${topicValue}_Q${item.q}`] || "").toLowerCase().includes(searchTerm))
                .map(item => {
                    const qKey = `${sourceValue}_${topicValue}_Q${item.q}`;
                    const isActive = checkedItems[qKey] ? 'active' : '';
                    const currentNote = savedNotes[qKey] || "";

                    return `
                        <div class="list-item">
                            <div class="check-btn ${isActive}" onclick="toggleCheck('${qKey}', event)"></div>
                            <a href="${item.url}" target="_blank" class="q-link" style="flex: 0 0 120px;">
                                <span class="q-id">QUESTION ${item.q}</span>
                            </a>
                            <input type="text" 
                                   value="${currentNote}" 
                                   placeholder="Click to add description..." 
                                   oninput="saveNote('${qKey}', this.value)"
                                   style="background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--silver); flex: 1; padding: 5px; font-family: var(--font-din); outline: none; margin: 0 15px;">
                            <span class="go-icon">→</span>
                        </div>
                    `;
                }).join('');
            updateProgress();
        }

        function toggleTimer() {
            const btn = document.getElementById('startPauseBtn');
            if (!isRunning) {
                isRunning = true;
                btn.innerText = "Halt";
                btn.classList.add('active');
                timerInterval = setInterval(() => {
                    seconds++;
                    updateSVGTimer();
                }, 1000);
            } else {
                isRunning = false;
                btn.innerText = "Engage";
                btn.classList.remove('active');
                clearInterval(timerInterval);
            }
        }

        function resetTimer() {
            seconds = 0;
            updateSVGTimer();
            if (isRunning) toggleTimer();
        }

        function updateSVGTimer() {
            const hrs = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const mins = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('svgTime').textContent = `${hrs}:${mins}:${secs}`;
        }

        window.resetTopic = function() {
            const currentSource = sourceDropdown.value;
            const currentTopic = topicDropdown.value;
            if (confirm(`Reset progress for ${currentTopic}?`)) {
                masterData[currentSource][currentTopic].forEach(item => {
                    delete checkedItems[`${currentSource}_${currentTopic}_Q${item.q}`];
                });
                saveAndSync();
            }
        }

        window.resetAll = function() {
            if (confirm("Permanently wipe all course progress data?")) {
                checkedItems = {};
                savedNotes = {};
                localStorage.removeItem('dp700_notes_v3');
                saveAndSync();
            }
        }

        sourceDropdown.onchange = render;
        topicDropdown.onchange = render;
        searchInput.oninput = render;
        render();
    </script>
</body>
